<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio - Contact</title>
    <link rel="stylesheet" href="rush.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        'inter': ['Inter', 'sans-serif'],
                    },
                    animation: {
                        'fade-in-down': 'fadeInDown 0.7s ease-out',
                        'fade-in-up': 'fadeInUp 0.7s ease-out',
                    },
                    keyframes: {
                        fadeInDown: {
                            '0%': { opacity: '0', transform: 'translateY(-30px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        fadeInUp: {
                            '0%': { opacity: '0', transform: 'translateY(30px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                    },
                }
            }
        }
    </script>
    <style>
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="font-inter min-h-screen bg-gradient-to-br from-blue-500 to-purple-600 text-gray-800 py-5">
    <div class="max-w-4xl mx-auto px-5">
        <nav class="sticky top-0 z-50 bg-white shadow-lg py-0 mb-7 border-b-4 border-blue-500 -my-5">
            <div class="max-w-4xl mx-auto px-5 flex justify-between items-center">
                <a href="main.html" class="text-xl font-bold text-gray-800 no-underline">Portfolio</a>
                <ul class="flex list-none gap-0">
                    <li><a href="aboutbio.html" class="block py-4 px-12 text-gray-800 no-underline font-medium transition-all duration-300 border-b-4 border-transparent text-sm bg-blue-50 hover:text-blue-600 hover:border-blue-500 hover:bg-blue-100">About Me</a></li>
                    <li><a href="showcasebio.html" class="block py-4 px-12 text-gray-800 no-underline font-medium transition-all duration-300 border-b-4 border-transparent text-sm bg-blue-50 hover:text-blue-600 hover:border-blue-500 hover:bg-blue-100">Showcase</a></li>
                    <li><a href="contractbio.html" class="block py-4 px-12 text-gray-800 no-underline font-medium transition-all duration-300 border-b-4 border-transparent text-sm bg-blue-50 hover:text-blue-600 hover:border-blue-500 hover:bg-blue-100 active:text-blue-600 active:border-blue-500 active:bg-blue-200">Contact</a></li>
                </ul>
            </div>
        </nav>

        <header class="text-center text-white mb-12 animate-fade-in-down">
            <h1 class="text-5xl font-bold mb-4 text-shadow-lg">Contact Me</h1>
            <p class="text-xl font-light opacity-95">Let's Connect & Work Together</p>
        </header>

        <section class="bg-white rounded-3xl p-10 shadow-2xl mb-7 animate-fade-in-up">
            <h3 class="text-3xl font-bold text-gray-800 mb-6 flex items-center gap-3">
                <span class="w-1 h-10 bg-gradient-to-b from-blue-500 to-purple-600 rounded"></span>
                Get In Touch
            </h3>


            <div class="max-w-2xl mx-auto">
                <form class="space-y-6">
                    <div>
                        <label class="block text-gray-700 font-semibold mb-2">Name</label>
                        <input type="text" class="w-full p-3 border-2 border-gray-300 rounded-lg focus:border-blue-500 focus:outline-none transition-colors duration-300" required>
                    </div>
                    <div>
                        <label class="block text-gray-700 font-semibold mb-2">Email</label>
                        <input type="email" class="w-full p-3 border-2 border-gray-300 rounded-lg focus:border-blue-500 focus:outline-none transition-colors duration-300" required>
                    </div>
                    <div>
                        <label class="block text-gray-700 font-semibold mb-2">Subject</label>
                        <input type="text" class="w-full p-3 border-2 border-gray-300 rounded-lg focus:border-blue-500 focus:outline-none transition-colors duration-300" required>
                    </div>
                    <div>
                        <label class="block text-gray-700 font-semibold mb-2">Message</label>
                        <textarea class="w-full p-3 border-2 border-gray-300 rounded-lg focus:border-blue-500 focus:outline-none transition-colors duration-300 resize-none" rows="5" required></textarea>
                    </div>
                    <button type="submit" class="w-full bg-gradient-to-r from-blue-500 to-purple-600 text-white py-3 px-6 rounded-lg font-semibold hover:shadow-lg transform hover:scale-105 transition-all duration-300">Send Message</button>
                </form>
            </div>
        </section>

        <section class="bg-gradient-to-r from-blue-500 to-purple-600 text-white rounded-3xl p-10 shadow-2xl animate-fade-in-up">
            <h3 class="text-3xl font-bold mb-6 flex items-center gap-3">
                <span class="w-1 h-10 bg-white rounded"></span>
                Connect With Me
            </h3>
            <p class="text-xl mb-8 opacity-90">Find me on social media and professional networks</p>
            <div class="flex flex-wrap justify-center gap-6">
                <a href="#" class="bg-white bg-opacity-20 text-white px-6 py-3 rounded-2xl no-underline font-semibold border-2 border-white border-opacity-30 hover:bg-opacity-30 hover:scale-105 transition-all duration-300">LinkedIn</a>
                <a href="#" class="bg-white bg-opacity-20 text-white px-6 py-3 rounded-2xl no-underline font-semibold border-2 border-white border-opacity-30 hover:bg-opacity-30 hover:scale-105 transition-all duration-300">GitHub</a>
                <a href="#" class="bg-white bg-opacity-20 text-white px-6 py-3 rounded-2xl no-underline font-semibold border-2 border-white border-opacity-30 hover:bg-opacity-30 hover:scale-105 transition-all duration-300">Twitter</a>
                <a href="#" class="bg-white bg-opacity-20 text-white px-6 py-3 rounded-2xl no-underline font-semibold border-2 border-white border-opacity-30 hover:bg-opacity-30 hover:scale-105 transition-all duration-300">Instagram</a>
            </div>
        </section>
    </div>
    <script src="rgb color.js"></script>
</body>
</html>
</html>
