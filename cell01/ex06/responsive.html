<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Table</title>
    <style>
        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            min-height: 100%;
        }

        body {
            display: flex;
            align-items: stretch;
            justify-content: stretch;
            background: linear-gradient(135deg, #523962 0%, #3b284e 100%);
            font-family: Arial, sans-serif;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            height: 100vh;
            table-layout: fixed;
        }

        td {
            padding: 2rem 1.25rem;
            text-align: center;
            vertical-align: middle;
            font-size: clamp(1rem, 3vw, 2rem);
            font-weight: 700;
            color: white;
            word-wrap: break-word;
            min-width: 0;
        }

        .box1 {
            background-color: #4bb754;
        }

        .box2 {
            background-color: #d1493d;
        }

        @media (max-width: 520px) {
            table {
                display: block;
                height: auto;
            }

            td {
                display: block;
                width: 100%;
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <table>
        <tr>
            <td class="box1">Minecraft Bedrock</td>
            <td class="box2">Minecraft Java</td>
        </tr>
    </table>
</body>
</html>
